extend type Query {
    latestReviews(first: Int = 5): [Review!]!
}
type Review {
    body: String!
    author: User! @provides(fields: "username")
    product: Product!
}
extend type User @key(fields: "id") {
    id: ID! @external
    username: String! @external
    reviews: [Review]
}
extend type Product @key(fields: "upc") {
    upc: String! @external
    reviews: [Review]
}
